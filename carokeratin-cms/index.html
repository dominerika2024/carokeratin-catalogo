<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Carokeratin Beauty | Catálogo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #F8F9FA; padding: 16px; padding-bottom: 150px; }
        .container { max-width: 650px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #25D366 0%, #128C7E 100%); color: white; border-radius: 24px; padding: 24px 20px; text-align: center; }
        .header h1 { font-size: 1.6rem; }
        .categorias { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; justify-content: center; }
        .cat-btn { background: white; border: 1px solid #ddd; border-radius: 40px; padding: 8px 20px; cursor: pointer; }
        .cat-btn.active { background: #25D366; color: white; border-color: #25D366; }
        .productos { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(250px,1fr)); }
        .producto { background: white; border-radius: 24px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .producto-imagen { width: 100%; aspect-ratio: 1/1; background: #f0f0f0; display: flex; align-items: center; justify-content: center; }
        .producto-imagen img { width: 100%; height: 100%; object-fit: cover; }
        .producto-info { padding: 16px; }
        .producto-nombre { font-weight: bold; }
        .producto-desc { font-size: 0.8rem; color: #666; margin: 8px 0; }
        .producto-precio { font-weight: bold; color: #25D366; font-size: 1.2rem; }
        .cantidad { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
        .cantidad input { width: 60px; padding: 6px; border-radius: 30px; border: 1px solid #ccc; text-align: center; }
        .carrito { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 500px; background: white; border-radius: 28px; padding: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000; }
        .carrito-items { max-height: 200px; overflow-y: auto; }
        .carrito-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .total { font-weight: bold; margin-top: 12px; text-align: right; }
        .btn-whatsapp { background: #25D366; color: white; text-align: center; padding: 12px; border-radius: 40px; margin-top: 12px; display: block; text-decoration: none; font-weight: bold; }
        .btn-limpiar { background: #f0f0f0; border: none; padding: 8px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 8px; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>💇‍♀️ Carokeratin Beauty</h1>
        <p>✨ Cuidado capilar profesional | Envíos a todo el país</p>
    </div>
    <div id="categorias" class="categorias"></div>
    <div id="productos" class="productos loading">🔄 Cargando productos...</div>
</div>
<div class="carrito" id="carrito">
    <div class="carrito-items" id="carrito-items">Selecciona productos</div>
    <div class="total">Total: <span id="total">$0</span></div>
    <button id="limpiar" class="btn-limpiar">🗑️ Limpiar</button>
    <a id="whatsapp" class="btn-whatsapp" href="#">💬 Enviar pedido</a>
</div>
<script>
    let productos = [];
    let carrito = {};

    async function cargarProductos() {
        const res = await fetch('/_data/productos/productos.json');
        productos = await res.json();
        mostrarCategorias();
        mostrarProductos();
        cargarCarrito();
    }

    function mostrarCategorias() {
        const cats = [...new Set(productos.map(p => p.categoria))];
        const cont = document.getElementById('categorias');
        cont.innerHTML = `<button class="cat-btn active" data-cat="todos">Todos</button>`;
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'cat-btn';
            btn.textContent = cat;
            btn.dataset.cat = cat;
            btn.onclick = () => filtrarPorCategoria(cat, btn);
            cont.appendChild(btn);
        });
    }

    function filtrarPorCategoria(cat, btnActivo) {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        btnActivo.classList.add('active');
        const filtrados = cat === 'todos' ? productos : productos.filter(p => p.categoria === cat);
        mostrarProductos(filtrados);
    }

    function mostrarProductos(lista = productos) {
        const cont = document.getElementById('productos');
        cont.innerHTML = '';
        lista.forEach(prod => {
            if (prod.habilitado === false) return;
            const div = document.createElement('div');
            div.className = 'producto';
            div.innerHTML = `
                <div class="producto-imagen">${prod.imagen ? `<img src="${prod.imagen}" onerror="this.parentElement.innerHTML='🧴'">` : '🧴'}</div>
                <div class="producto-info">
                    <div class="producto-nombre">${prod.nombre}</div>
                    <div class="producto-desc">${prod.descripcion || ''}</div>
                    <div class="producto-precio">$${prod.precio}</div>
                    <div class="cantidad">
                        <label>Cant:</label>
                        <input type="number" min="0" value="${carrito[prod.id] || 0}" data-id="${prod.id}" data-precio="${prod.precio}" data-nombre="${prod.nombre}">
                    </div>
                </div>
            `;
            cont.appendChild(div);
        });
        document.querySelectorAll('.cantidad input').forEach(input => {
            input.addEventListener('change', actualizarCantidad);
        });
    }

    function actualizarCantidad(e) {
        const id = e.target.dataset.id;
        const cantidad = parseInt(e.target.value);
        if (cantidad <= 0) delete carrito[id];
        else carrito[id] = cantidad;
        guardarCarrito();
        mostrarCarrito();
    }

    function guardarCarrito() { localStorage.setItem('carrito', JSON.stringify(carrito)); }
    function cargarCarrito() {
        const saved = localStorage.getItem('carrito');
        if (saved) carrito = JSON.parse(saved);
        mostrarCarrito();
    }
    function limpiarCarrito() { carrito = {}; guardarCarrito(); mostrarCarrito(); recargarCantidades(); }

    function recargarCantidades() {
        document.querySelectorAll('.cantidad input').forEach(input => {
            const id = input.dataset.id;
            input.value = carrito[id] || 0;
        });
    }

    function mostrarCarrito() {
        const container = document.getElementById('carrito-items');
        let total = 0;
        let itemsHtml = '';
        for (let id in carrito) {
            const prod = productos.find(p => p.id == id);
            if (!prod) continue;
            const cant = carrito[id];
            const subtotal = prod.precio * cant;
            total += subtotal;
            itemsHtml += `<div class="carrito-item"><span>${prod.nombre} x${cant}</span><span>$${subtotal}</span></div>`;
        }
        if (itemsHtml === '') container.innerHTML = 'Selecciona productos';
        else container.innerHTML = itemsHtml;
        document.getElementById('total').innerHTML = `$${total}`;
        const btn = document.getElementById('whatsapp');
        if (Object.keys(carrito).length > 0) {
            let msg = `🛍️ *PEDIDO CAROKERATIN* 🛍️%0A%0A`;
            let i = 1;
            for (let id in carrito) {
                const prod = productos.find(p => p.id == id);
                if (prod) msg += `${i++}. ${prod.nombre} - ${carrito[id]} x $${prod.precio} = $${prod.precio * carrito[id]}%0A`;
            }
            msg += `%0A*TOTAL:* $${total}%0A%0A*Nombre:* %0A*Dirección:* %0A*Teléfono:* %0A`;
            btn.href = `https://wa.me/573001234567?text=${encodeURIComponent(msg)}`;
            btn.style.opacity = '1';
        } else {
            btn.href = '#';
            btn.style.opacity = '0.5';
        }
    }

    document.getElementById('limpiar').onclick = limpiarCarrito;
    cargarProductos();
</script>
</body>
</html>
